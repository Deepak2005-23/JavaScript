<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Digital Clock</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-q2xqN5hBmZK4Cq+YOjZvv9B7J4xg0385AkP6LvWmZ3z5oMj7XfwKJ0gk5KG9F7XJ" crossorigin="anonymous" />
        <style>
            body {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #f8f9fa;
                margin: 0;
            }
            .clock-card {
                max-width: 420px;
                width: 100%;
                padding: 2rem;
                border-radius: 1.25rem;
                background: #ffffff;
                box-shadow: 0 0.75rem 1.5rem rgba(0, 0, 0, 0.08);
            }
            .clock-time {
                font-size: clamp(3rem, 6vw, 5rem);
                font-weight: 700;
                letter-spacing: 0.08em;
            }
            .clock-date {
                font-size: 1.1rem;
                color: #6c757d;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-10 col-lg-8">
                    <div class="clock-card text-center">
                        <h1 class="mb-4">Digital Clock</h1>
                        <div id="abc" class="clock-time text-primary">00:00:00</div>
                        <div id="date" class="clock-date mt-2">Loading date...</div>
                        <button id="toggleFormat" class="btn btn-outline-primary btn-sm mt-4">Switch to 12-hour</button>
                    </div>
                </div>
            </div>
        </div>
        <script src="clock.js" type="text/javascript"></script>
    </body>
</html>
