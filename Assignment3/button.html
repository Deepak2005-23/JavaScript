<html>
    <head>
        <script src="./function.js" type="text/javascript"></script>
    </head>
    <body>
        <div>
        <label>OnMouseOver</label><br>
        <button style="background-color: red" id="btn" onmouseover="mouseover()">MouseOver</button>
        </div>
        <div>
            <label>OnClick</label><br>
            <button style="background-color: red" id="btn2" onclick="onClick()">OnClick</button>
        </div>
        <div>
            <label>OnMouseout</label><br>
            <button style="background-color: red" id="btn3" onmouseout="out()">Mouse Out</button>
        </div>
        <div>
            <label>Ondblclick</label><br>
            <button style="background-color: red" class="xyz" ondblclick="dblclick()">Ondblclick</button>  //using class reference
        </div>
        <div>
            <label>Onfocus</label><br>
            <input id="btn5" onfocus="onFocus()">
        </div>
        <div>
            <label>onchange</label><br>
           <input id="btn6" onchange="display()" type="text"/>
        </div>
    </body>
</html>
